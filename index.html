<!DOCTYPE html>
<html lang="de" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linksammlung</title>
    <link rel="icon" href="assets/favicon.svg">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-color: #171717; /* neutral-900 */
            --text-color: #f5f5f5; /* neutral-100 */
            --card-bg: #262626; /* neutral-800 */
            --border-color: #404040; /* neutral-700 */
            --modal-bg: #262626; /* neutral-800 */
            --accent-color: #525252; /* neutral-600 */
            --accent-color-hover: #737373; /* neutral-500 */
        }

        body {
            font-family: 'Ubuntu', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 40% 1fr;
            height: 100vh;
        }

        .app-drawer-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .content-area {
            padding: 2rem;
            overflow-y: auto;
        }

        .link-card {
            background-color: var(--card-bg);
            border-radius: 0.75rem;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .modal-overlay {
            transition: opacity 0.3s ease-in-out;
        }

        .modal-container {
            transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
        }

        .modal-container.hidden {
            transform: scale(0.95);
            opacity: 0;
        }
        #open-agenda-btn:hover {
            background-color: var(--accent-color-hover) !important;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .app-drawer-container {
                display: none;
            }
            .content-area {
                padding: 1rem;
            }
            #open-agenda-btn {
                display: none;
            }
        }
    </style>
</head>

<body class="h-full">

    <div class="main-grid">
        <aside class="app-drawer-container">
            <iframe src="appdrawer.html" class="app-drawer-iframe"></iframe>
        </aside>

        <main class="content-area">
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-bold text-white">Meine Web-Apps</h1>
                <button id="open-agenda-btn"
                    class="text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition-colors"
                    style="background-color: var(--accent-color);">
                    <span class="material-icons">calendar_month</span>
                    Agenda
                </button>
            </header>

            <div id="links-grid" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Links werden hier per JS eingefügt -->
            </div>
        </main>
    </div>

    <!-- Agenda Modal -->
    <div id="agenda-modal" class="fixed inset-0 z-50 hidden">
        <div id="modal-overlay" class="absolute inset-0 bg-black bg-opacity-75"></div>
        <div
            class="modal-container hidden relative rounded-xl shadow-2xl w-11/12 h-5/6 max-w-6xl mx-auto mt-12 flex flex-col" style="background-color: var(--modal-bg);">
            <header class="flex items-center justify-between p-4 border-b" style="border-color: var(--border-color);">
                <h2 class="text-xl font-semibold text-white">Agenda</h2>
                <button id="close-agenda-btn" class="text-gray-400 hover:text-white">
                    <span class="material-icons">close</span>
                </button>
            </header>
            <div class="flex-grow p-1">
                <iframe id="agenda-iframe" src="about:blank" data-src="agenda.html" class="w-full h-full border-0 rounded-b-lg"></iframe>
            </div>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const links = [
                { name: 'Widgets', url: 'https://dev0gig.github.io/web-widgets/', icon: 'widgets', imageUrl: 'assets/web-widgets.png' },
                { name: 'RSS Reader', url: 'https://dev0gig.github.io/web-rssreader/', icon: 'rss_feed', imageUrl: 'assets/web-rssreader.png' },
                { name: 'Read Later', url: 'https://dev0gig.github.io/web-readlater/', icon: 'bookmark', imageUrl: 'assets/web-readlater.png' },
                { name: 'MemoMea', url: 'https://dev0gig.github.io/web-memomea/', icon: 'memory', imageUrl: 'assets/web-memomea.png' },
                { name: 'HabitMea', url: 'https://dev0gig.github.io/web-habitmea/', icon: 'checklist', imageUrl: 'assets/web-habitmea.png' },
                { name: 'AuriMea', url: 'https://dev0gig.github.io/web-aurimea/', icon: 'headset', imageUrl: 'assets/web-aurimea.png' },
                { name: 'ActaMea', url: 'https://dev0gig.github.io/web-actamea/', icon: 'article', imageUrl: 'assets/web-actamea.png' },
                { name: 'Jap Mentor', url: 'https://dev0gig.github.io/web-jap_mentor/', icon: 'school', imageUrl: 'assets/web-jap_mentor.png' },
                { name: 'Fitness Data', url: 'https://dev0gig.github.io/web-fitness_data/', icon: 'fitness_center', imageUrl: 'assets/web-fitness_data.png' },
                { name: 'Discere', url: 'https://dev0gig.github.io/web-discere/', icon: 'menu_book', imageUrl: 'assets/web-discere.png' },
                { name: 'Work Tools', url: 'https://dev0gig.github.io/web-mywebsite/unicorn/work-tools.html', icon: 'work', imageUrl: 'assets/web-unicorn.jpg' }
            ];

            const grid = document.getElementById('links-grid');

            links.forEach(link => {
                const card = document.createElement('a');
                card.href = link.url;
                card.target = '_self'; // Im selben Tab öffnen
                card.className = 'link-card block';

                const imagePlaceholder = `
                    <div class="w-full h-32 bg-neutral-700 flex items-center justify-center">
                        <span class="material-icons text-4xl text-neutral-500">image</span>
                    </div>`;
                const imageElement = `<img src="${link.imageUrl}" alt="${link.name}" class="w-full h-32 object-cover">`;

                card.innerHTML = `
                    ${link.imageUrl ? imageElement : imagePlaceholder}
                    <div class="p-4">
                        <h3 class="text-xl font-semibold text-white flex items-center justify-center gap-2">
                            <span class="material-icons">${link.icon}</span>
                            <span>${link.name}</span>
                        </h3>
                        <p class="text-gray-400 text-sm mt-2 truncate">${link.url}</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Modal Logic
            const agendaModal = document.getElementById('agenda-modal');
            const modalContainer = agendaModal.querySelector('.modal-container');
            const openAgendaBtn = document.getElementById('open-agenda-btn');
            const closeAgendaBtn = document.getElementById('close-agenda-btn');
            const modalOverlay = document.getElementById('modal-overlay');
            const agendaIframe = document.getElementById('agenda-iframe');

            const openModal = () => {
                if (agendaIframe.src === 'about:blank') {
                    agendaIframe.src = agendaIframe.dataset.src;
                }
                agendaModal.classList.remove('hidden');
                setTimeout(() => {
                    modalContainer.classList.remove('hidden');
                }, 10);
            };

            const closeModal = () => {
                modalContainer.classList.add('hidden');
                setTimeout(() => {
                    agendaModal.classList.add('hidden');
                }, 300);
            };

            openAgendaBtn.addEventListener('click', openModal);
            closeAgendaBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', closeModal);
        });
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>

</body>

</html>
